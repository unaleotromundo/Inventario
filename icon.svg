<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#181e30" />
    </linearGradient>

    <!-- Neon Glow Gradient -->
    <linearGradient id="neon-primary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glassmorphic Overlay Gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Icon Container (App Maskable Frame) -->
  <rect width="512" height="512" rx="110" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" />
  
  <!-- Outer Decorative Ring (Radar) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(139, 92, 246, 0.08)" stroke-width="8" stroke-dasharray="20 10" />

  <!-- Stylized Wireframe Page (SEO/HTML structure representation) -->
  <g transform="translate(146, 156)" opacity="0.35">
    <!-- Header -->
    <rect x="0" y="0" width="220" height="24" rx="6" fill="#fff" opacity="0.2"/>
    <!-- Menu -->
    <rect x="150" y="6" width="50" height="12" rx="4" fill="#fff" opacity="0.3"/>
    <!-- Hero Box -->
    <rect x="0" y="36" width="220" height="70" rx="8" fill="#fff" opacity="0.1" />
    <!-- Hero Text Lines -->
    <rect x="15" y="52" width="100" height="10" rx="3" fill="url(#neon-cyan)" />
    <rect x="15" y="72" width="140" height="8" rx="3" fill="#fff" opacity="0.3" />
    <!-- Body text grids -->
    <rect x="0" y="120" width="100" height="36" rx="6" fill="#fff" opacity="0.08" />
    <rect x="120" y="120" width="100" height="36" rx="6" fill="#fff" opacity="0.08" />
    <circle cx="20" cy="138" r="8" fill="#fff" opacity="0.3" />
    <rect x="35" y="134" width="50" height="8" rx="3" fill="#fff" opacity="0.2" />
    <circle cx="140" cy="138" r="8" fill="#fff" opacity="0.3" />
    <rect x="155" y="134" width="50" height="8" rx="3" fill="#fff" opacity="0.2" />
  </g>

  <!-- Big Glowing Audit Lens (Magnifying Glass / Cyber Eye) -->
  <!-- Handle -->
  <line x1="256" y1="256" x2="390" x2="390" stroke="url(#neon-primary)" stroke-width="26" stroke-linecap="round" filter="url(#glow)" transform="rotate(45 256 256) translate(0, -10)" />
  <line x1="256" y1="256" x2="390" x2="390" stroke="#fff" stroke-width="12" stroke-linecap="round" transform="rotate(45 256 256) translate(0, -10)" />

  <!-- Main Ring of Lens -->
  <circle cx="216" cy="216" r="110" fill="none" stroke="url(#neon-cyan)" stroke-width="20" filter="url(#glow)" />
  <circle cx="216" cy="216" r="110" fill="url(#glass)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
  
  <!-- Diagnostic Grid inside Lens -->
  <line x1="130" y1="216" x2="302" y2="216" stroke="rgba(6, 182, 212, 0.3)" stroke-width="2" stroke-dasharray="6 4" />
  <line x1="216" y1="130" x2="216" y2="302" stroke="rgba(6, 182, 212, 0.3)" stroke-width="2" stroke-dasharray="6 4" />

  <!-- Glowing Diagnosis Dots (SEO, Perf, A11y, UX representation) -->
  <circle cx="216" cy="216" r="12" fill="#fff" filter="url(#glow)" />
  <circle cx="170" cy="170" r="8" fill="url(#neon-primary)" filter="url(#glow)" />
  <circle cx="270" cy="250" r="10" fill="url(#neon-cyan)" filter="url(#glow)" />
  <circle cx="160" cy="260" r="7" fill="#10b981" filter="url(#glow)" />
  <circle cx="265" cy="165" r="9" fill="#f59e0b" filter="url(#glow)" />

  <!-- Glass reflection sweep -->
  <path d="M125 170 A105 105 0 0 1 270 140" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="5" stroke-linecap="round" />
</svg>
